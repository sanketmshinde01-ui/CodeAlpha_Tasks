<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Quiz App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:450px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    border:2px solid #ddd;
    padding:20px;
    border-radius:8px;
    min-height:120px;
    text-align:center;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
}

.show{
    background:#2196F3;
    color:white;
}

.prev,.next{
    background:#4CAF50;
    color:white;
}

.edit{
    background:orange;
    color:white;
}

.delete{
    background:red;
    color:white;
}

.add{
    background:purple;
    color:white;
    width:100%;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.answer{
    display:none;
    margin-top:10px;
    color:#333;
}
</style>
</head>
<body>

<div class="container">

    <h1>Flashcard Quiz</h1>

    <div class="card">
        <h3 id="question"></h3>
        <p id="answer" class="answer"></p>
    </div>

    <button class="show" onclick="showAnswer()">Show Answer</button>

    <br>

    <button class="prev" onclick="prevCard()">Previous</button>
    <button class="next" onclick="nextCard()">Next</button>

    <button class="edit" onclick="editCard()">Edit</button>
    <button class="delete" onclick="deleteCard()">Delete</button>

    <hr style="margin:15px 0;">

    <h3>Add New Flashcard</h3>

    <input type="text" id="newQuestion" placeholder="Enter Question">

    <textarea id="newAnswer" placeholder="Enter Answer"></textarea>

    <button class="add" onclick="addCard()">Add Flashcard</button>

</div>

<script>

let flashcards = [
    {
        question:"What is HTML?",
        answer:"HTML stands for HyperText Markup Language."
    },
    {
        question:"What is CSS?",
        answer:"CSS is used for styling web pages."
    },
    {
        question:"What is JavaScript?",
        answer:"JavaScript adds interactivity to websites."
    }
];

let currentIndex = 0;

function displayCard() {
    document.getElementById("question").innerText =
        flashcards[currentIndex].question;

    document.getElementById("answer").innerText =
        flashcards[currentIndex].answer;

    document.getElementById("answer").style.display = "none";
}

function showAnswer() {
    document.getElementById("answer").style.display = "block";
}

function nextCard() {
    if(currentIndex < flashcards.length - 1){
        currentIndex++;
        displayCard();
    }
}

function prevCard() {
    if(currentIndex > 0){
        currentIndex--;
        displayCard();
    }
}

function addCard() {

    let question =
        document.getElementById("newQuestion").value;

    let answer =
        document.getElementById("newAnswer").value;

    if(question === "" || answer === ""){
        alert("Please enter both question and answer.");
        return;
    }

    flashcards.push({
        question:question,
        answer:answer
    });

    document.getElementById("newQuestion").value="";
    document.getElementById("newAnswer").value="";

    alert("Flashcard Added!");
}

function editCard() {

    let newQuestion =
        prompt("Edit Question:",
        flashcards[currentIndex].question);

    let newAnswer =
        prompt("Edit Answer:",
        flashcards[currentIndex].answer);

    if(newQuestion && newAnswer){
        flashcards[currentIndex].question = newQuestion;
        flashcards[currentIndex].answer = newAnswer;
        displayCard();
    }
}

function deleteCard() {

    if(flashcards.length === 1){
        alert("Cannot delete last flashcard.");
        return;
    }

    flashcards.splice(currentIndex,1);

    if(currentIndex >= flashcards.length){
        currentIndex = flashcards.length - 1;
    }

    displayCard();
}

displayCard();

</script>

</body>
</html>
